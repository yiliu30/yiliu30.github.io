baseURL = 'https://yiliu30.github.io/'
languageCode = 'en-us'
title = 'My Personal Blog'
theme = 'PaperMod'

[params]
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

[params.comments]
  [params.comments.giscus]
    repo = "yiliu30/yiliu30.github.io"
    repoId = "R_kgDONqZP5A"
    category = "General"
    categoryId = "DIC_kwDORAs6Ic4C1ZCt"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "en"
    loading = "lazy"

[params.analytics]
  [params.analytics.goatcounter]
    code = "yiliu30"

[params.homeInfoParams]
  Title = "Hi there 👋"
  Content = "Welcome to my personal blog where I share my thoughts on technology, programming, and more."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/yiliu30"

[[params.socialIcons]]
  name = "twitter"
  url = "https://twitter.com/yiliu30"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
